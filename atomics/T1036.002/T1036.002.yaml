

- name: 'Masquerading: Right-to-Left Override Batch File Creation and Execution'
  description: |-
    Creates a batch file
  supported_platforms:
    - windows
  input_arguments:
    fileloc:
      type: path
      default: '[System.IO.Path]::Combine($env:USERPROFILE, "Desktop")'
      description: Input the file location. Default is the desktop.
  executor:
    command: |-
      $fileloc = "#{fileloc}"
      $rtlo = [char]0x202E
      $filename = "evil_document" + [char]0x202E + "fdp.bat"
      $fullpath = Join-Path $fileloc $filename
      $batchcontent =@"
      @echo off
      echo Hello World
      pause
      "@
      Out-File -FilePath $fullPath -InputObject $batchContent -Encoding ascii
    elevation_required: false

