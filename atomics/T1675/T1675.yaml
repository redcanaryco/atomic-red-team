attack_technique: T1675
display_name: "ESXi Administration Command"
atomic_tests:

  - name: ESXi Enumerate Running Virtual Machines via esxcli (Linux)
    auto_generated_guid:
    description: |
      Enumerates running virtual machines on an ESXi host using esxcli over SSH from a Linux machine.
      Adversaries may use this command to identify active virtual machines prior to impact.
      This test executes from a Linux machine with SSH access to the ESXi host using sshpass
      for non-interactive authentication, simulating an attacker who has obtained ESXi credentials.

      Detection Focus:
      - Execution of esxcli commands on the ESXi shell
      - Enumeration of VM processes via SSH
      - Unusual ESXi SSH session activity
    supported_platforms:
      - linux
    input_arguments:
      esxi_host:
        description: IP address of the ESXi host
        type: string
        default: 192.168.1.100
      esxi_user:
        description: ESXi username
        type: string
        default: root
      esxi_password:
        description: ESXi root password
        type: string
        default: password
    dependency_executor_name: sh
    dependencies:
      - description: |
          sshpass must be installed for non-interactive SSH authentication
        prereq_command: |
          if [ -x "$(command -v sshpass)" ]; then exit 0; else exit 1; fi
        get_prereq_command: |
          apt-get install -y sshpass
      - description: |
          The ESXi host must be reachable over SSH
        prereq_command: |
          sshpass -p "#{esxi_password}" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 #{esxi_user}@#{esxi_host} "echo connected" 2>/dev/null && exit 0 || exit 1
        get_prereq_command: |
          echo "Cannot reach ESXi host at #{esxi_host}. Verify the host is running and SSH is enabled."
    executor:
      name: sh
      elevation_required: false
      command: |
        sshpass -p "#{esxi_password}" ssh -o StrictHostKeyChecking=no #{esxi_user}@#{esxi_host} "esxcli vm process list"
      cleanup_command: |
        echo "No cleanup required"


  - name: ESXi Enumerate Running Virtual Machines via esxcli (Windows)
    auto_generated_guid:
    description: |
      Enumerates running virtual machines on an ESXi host using esxcli over SSH from a Windows machine.
      Adversaries may use this command to identify active virtual machines prior to impact.
      This test executes from a Windows machine using plink.exe to SSH into the ESXi host,
      simulating an attacker operating from a compromised Windows guest VM on the same ESXi host.
      This is consistent with UNC3886 tradecraft where a compromised Windows guest was used to
      interact with the ESXi hypervisor.

      Detection Focus:
      - Execution of esxcli commands on the ESXi shell
      - Enumeration of VM processes via SSH from a Windows guest
      - plink.exe used to establish SSH sessions to ESXi
    supported_platforms:
      - windows
    input_arguments:
      esxi_host:
        description: IP address of the ESXi host
        type: string
        default: 192.168.1.100
      esxi_user:
        description: ESXi username
        type: string
        default: root
      esxi_password:
        description: ESXi root password
        type: string
        default: password
      plink_path:
        description: Path to plink.exe
        type: path
        default: C:\Windows\System32\plink.exe
    dependency_executor_name: powershell
    dependencies:
      - description: |
          plink.exe must exist at the specified path
        prereq_command: |
          if (Test-Path "#{plink_path}") {exit 0} else {exit 1}
        get_prereq_command: |
          Write-Output "Downloading plink.exe..."
          Invoke-WebRequest -Uri "https://the.earth.li/~sgtatham/putty/latest/w64/plink.exe" -OutFile "#{plink_path}"
      - description: |
          The ESXi host must be reachable over SSH
        prereq_command: |
          $result = echo y | & "#{plink_path}" -ssh #{esxi_user}@#{esxi_host} -pw #{esxi_password} "echo connected" 2>&1
          if ($result -match "connected") {exit 0} else {exit 1}
        get_prereq_command: |
          Write-Output "Cannot reach ESXi host at #{esxi_host}. Verify the host is running and SSH is enabled."
    executor:
      name: powershell
      elevation_required: false
      command: |
        echo y | & "#{plink_path}" -ssh #{esxi_user}@#{esxi_host} -pw #{esxi_password} "esxcli vm process list"
      cleanup_command: |
        Write-Output "No cleanup required"


