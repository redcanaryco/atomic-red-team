attack_technique: T1055.009
display_name: 'Process Injection: Proc Memory'
atomic_tests:
- name: Inplace Instruction Overwrite
  description: |
    This technique implements a Direct Instruction Overwrite.
    Bypassing the need to look for a separate Code Cave,
    It locates the exact memory address the CPU is about to execute
    (via the RIP register, gathered in the /proc/PID/syscall file)
    and overwrites that location with the entire shellcode in /proc/PID/mem.

    The injection targets RIP - 2 to account for Linux kernel syscall restarting:
    when a process interrupted during a system call is resumed,
    the kernel typically rewinds the instruction pointer by 2 bytes to re-execute the syscall instruction.
    To prevent crashes in cases where the process was not in a syscall,
    a NOP sled (padding with 0x90) is prepended to the payload,
    ensuring the execution flow safely slides into the shellcode regardless of the exact byte offset.
    [!]: Strictly speaking, this technique does not require handling syscall restarts,
    since we are not interrupting the victim during a syscall. The NOP sled is included for generality
    (the same shellcode could be reused in scenarios where syscall restarting does occur)
    and as a defensive measure against off-by-a-few-bytes inaccuracies in the RIP read from /proc/<pid>/syscall.
    
    Note: this test forks a child process to use as the injection target.
    This allows the test to run on systems where ptrace_scope=1 (default on most Linux distributions),
    where a process can only modify the memory of its own descendants.
    This may differ from a real-world scenario where the attacker targets an arbitrary process,
    but for the purpose of this test it preserves the detection-relevant behavior: the same syscalls and /proc/<pid>/mem
    access patterns are generated regardless of the relationship between injector and target.
  supported_platforms:
    - linux
  dependencies:
    - description: 'gcc must be installed'
      prereq_command: which gcc
      get_prereq_command: apt-get install -y gcc
    - description: 'inplace_instruction_overwrite must be compiled'
      prereq_command: test -f PathToAtomicsFolder/T1055.009/bin/inplace_instruction_overwrite
      get_prereq_command: make -C PathToAtomicsFolder/T1055.009/src
    - description: '/tmp/pwned must not exist before the test'
      prereq_command: test ! -f /tmp/pwned
      get_prereq_command: rm -f /tmp/pwned
  input_arguments:
    bin_path:
      type: path
      default: PathToAtomicsFolder/T1055.009/bin/inplace_instruction_overwrite
      description: path to inplace_instruction_overwrite
  executor:
    command: '#{bin_path}'
    cleanup_command: rm -f /tmp/pwned
    name: sh
    elevation_required: false
- name: Instruction Overwrite Jump
  description: |
    This technique achieves control-flow hijacking via Code Patching.
    It first identifies a code cave by scanning /proc/<pid>/maps
    and writes the shellcode into it through /proc/<pid>/mem.
    It then reads the current Instruction Pointer (RIP)
    to understand exactly what instruction the CPU is about to execute,
    and overwrites the instructions at that memory location
    with an unconditional jump pointing to the shellcode address.

    The injection targets RIP - 2 to account for Linux kernel syscall restarting:
    when a process interrupted during a system call is resumed,
    the kernel typically rewinds the instruction pointer by 2 bytes to re-execute the syscall instruction.
    To prevent crashes in cases where the process was not in a syscall,
    a NOP sled (padding with 0x90) is prepended to the payload,
    ensuring the execution flow safely slides into the shellcode regardless of the exact byte offset.
    [!]: Strictly speaking, this technique does not require handling syscall restarts,
    since we are not interrupting the victim during a syscall. The NOP sled is included for generality
    (the same shellcode could be reused in scenarios where syscall restarting does occur)
    and as a defensive measure against off-by-a-few-bytes inaccuracies in the RIP read from /proc/<pid>/syscall.
    
    Note: this test forks a child process to use as the injection target.
    This allows the test to run on systems where ptrace_scope=1 (default on most Linux distributions),
    where a process can only modify the memory of its own descendants.
    This may differ from a real-world scenario where the attacker targets an arbitrary process,
    but for the purpose of this test it preserves the detection-relevant behavior: the same syscalls and /proc/<pid>/mem
    access patterns are generated regardless of the relationship between injector and target.
  supported_platforms:
    - linux
  dependencies:
    - description: 'gcc must be installed'
      prereq_command: which gcc
      get_prereq_command: apt-get install -y gcc
    - description: 'instruction_overwrite_jump must be compiled'
      prereq_command: test -f PathToAtomicsFolder/T1055.009/bin/instruction_overwrite_jump
      get_prereq_command: make -C PathToAtomicsFolder/T1055.009/src
    - description: '/tmp/pwned must not exist before the test'
      prereq_command: test ! -f /tmp/pwned
      get_prereq_command: rm -f /tmp/pwned
  input_arguments:
    bin_path:
      type: path
      default: PathToAtomicsFolder/T1055.009/bin/instruction_overwrite_jump
      description: path to instruction_overwrite_jump
  executor:
    command: '#{bin_path}'
    cleanup_command: rm -f /tmp/pwned
    name: sh
    elevation_required: false
- name: GOT Injection
  description: |
    This technique identifies a code cave by scanning /proc/<pid>/maps
    and writes the shellcode into it through /proc/<pid>/mem.
    To redirect the execution flow, it parses the target's ELF structure through /proc/<pid>/exe
    to locate the Global Offset Table (.got.plt) and calculates the absolute addresses for PIE-enabled binaries.
    By overwriting these GOT entries with the shellcode's address,
    the injector ensures that the next time the victim calls a dynamic library function,
    it will inadvertently execute the injected payload instead.

    get_got:
    Locates the Global Offset Table (.got.plt), which is an array of pointers 
    the program uses to dynamically find external library functions.
    - Finds the string table (shstrtab) containing the names of all sections.
    - Searches for the section named ".got.plt", extracting its address and size.
    - PIE Handling: If the executable is dynamic (ET_DYN / PIE), the found 
    address is just a relative offset. It must be added to the base_address 
    (found before) to get the absolute RAM address.
    
    Note: this test forks a child process to use as the injection target.
    This allows the test to run on systems where ptrace_scope=1 (default on most Linux distributions),
    where a process can only modify the memory of its own descendants.
    This may differ from a real-world scenario where the attacker targets an arbitrary process,
    but for the purpose of this test it preserves the detection-relevant behavior: the same syscalls and /proc/<pid>/mem
    access patterns are generated regardless of the relationship between injector and target.
  supported_platforms:
    - linux
  dependencies:
    - description: 'gcc must be installed'
      prereq_command: which gcc
      get_prereq_command: apt-get install -y gcc
    - description: 'got_injection must be compiled'
      prereq_command: test -f PathToAtomicsFolder/T1055.009/bin/got_injection
      get_prereq_command: make -C PathToAtomicsFolder/T1055.009/src
    - description: '/tmp/pwned must not exist before the test'
      prereq_command: test ! -f /tmp/pwned
      get_prereq_command: rm -f /tmp/pwned
  input_arguments:
    bin_path:
      type: path
      default: PathToAtomicsFolder/T1055.009/bin/got_injection
      description: path to got_injection
  executor:
    command: '#{bin_path}'
    cleanup_command: rm -f /tmp/pwned
    name: sh
    elevation_required: false
- name: Return Address Overwrite
  description: |
    This technique performs control-flow hijacking via Return Address Overwriting.
    It first identifies a code cave by scanning /proc/<pid>/maps
    and writes the shellcode into it through /proc/<pid>/mem.
    It then inspects the process stack (from the RSP register) to locate the saved return address.
    By overwriting this stack location with the address of the code cave,
    the execution is redirected to the payload the moment the CPU executes the next RET instruction.
    
    Note: this test forks a child process to use as the injection target.
    This allows the test to run on systems where ptrace_scope=1 (default on most Linux distributions),
    where a process can only modify the memory of its own descendants.
    This may differ from a real-world scenario where the attacker targets an arbitrary process,
    but for the purpose of this test it preserves the detection-relevant behavior: the same syscalls and /proc/<pid>/mem
    access patterns are generated regardless of the relationship between injector and target.
  supported_platforms:
    - linux
  dependencies:
    - description: 'gcc must be installed'
      prereq_command: which gcc
      get_prereq_command: apt-get install -y gcc
    - description: 'return_address_overwrite must be compiled'
      prereq_command: test -f PathToAtomicsFolder/T1055.009/bin/return_address_overwrite
      get_prereq_command: make -C PathToAtomicsFolder/T1055.009/src
    - description: '/tmp/pwned must not exist before the test'
      prereq_command: test ! -f /tmp/pwned
      get_prereq_command: rm -f /tmp/pwned
  input_arguments:
    bin_path:
      type: path
      default: PathToAtomicsFolder/T1055.009/bin/return_address_overwrite
      description: path to return_address_overwrite
  executor:
    command: '#{bin_path}'
    cleanup_command: rm -f /tmp/pwned
    name: sh
    elevation_required: false
- name: ROP chain Mprotect Return Address Overwrite
  description: |
    This technique performs control-flow hijacking via Return Address Overwriting.
    It first identifies a (rw-) memory region by scanning /proc/<pid>/maps
    and writes the shellcode into it through /proc/<pid>/mem.
    It then builds the ROP chain to call mprotect to make the payload executable
    After that it inspects the process stack (from the RSP register) to locate the saved return address.
    By overwriting this stack location with the address of the code cave,
    the moment the CPU executes the next RET instruction,
    execution is redirected into the ROP chain, and from there to the payload.

    Compared to the simpler "code cave + return address overwrite" variant,
    this technique does not require finding an executable code cave:
    it can write the payload into any writable region (heap, .data)
    and use a ROP chain to invoke mprotect and grant execution permissions before jumping into it.
    This is useful when no suitable executable cave is available in the victim's mapping,
    or in scenarios such as remote exploitation via buffer overflow,
    where the attacker has control over the stack but not over arbitrary memory writes.
    
    Note: this test forks a child process to use as the injection target.
    This allows the test to run on systems where ptrace_scope=1 (default on most Linux distributions),
    where a process can only modify the memory of its own descendants.
    This may differ from a real-world scenario where the attacker targets an arbitrary process,
    but for the purpose of this test it preserves the detection-relevant behavior: the same syscalls and /proc/<pid>/mem
    access patterns are generated regardless of the relationship between injector and target.
  supported_platforms:
    - linux
  dependencies:
    - description: 'gcc must be installed'
      prereq_command: which gcc
      get_prereq_command: apt-get install -y gcc
    - description: 'rop_mprotect_return_address_overwrite must be compiled'
      prereq_command: test -f PathToAtomicsFolder/T1055.009/bin/rop_mprotect_return_address_overwrite
      get_prereq_command: make -C PathToAtomicsFolder/T1055.009/src
    - description: '/tmp/pwned must not exist before the test'
      prereq_command: test ! -f /tmp/pwned
      get_prereq_command: rm -f /tmp/pwned
  input_arguments:
    bin_path:
      type: path
      default: PathToAtomicsFolder/T1055.009/bin/rop_mprotect_return_address_overwrite
      description: path to rop_mprotect_return_address_overwrite
  executor:
    command: '#{bin_path}'
    cleanup_command: rm -f /tmp/pwned
    name: sh
    elevation_required: false
- name: Return Address Overwrite for full ROP chain execution
  description: |
    The injector reads the victim's RSP register from /proc/<pid>/syscall
    to map the current stack frame. It then scans the stack memory
    to locate the exact return address of the currently executing function.
    It then generates a ROP chain to execute commands with arguments via exec().
    (it doesn't support shell metacharacters e.g. '|', '>' or '>>' )
    To do so it needs to locate a writable memory region, to hold all arguments.
    Here it builds the 'argv' of the command to invoke the exec syscall.
    Finally, it overwrites the return address on the victim's stack with the ROP chain.
    
    Note: this test forks a child process to use as the injection target.
    This allows the test to run on systems where ptrace_scope=1 (default on most Linux distributions),
    where a process can only modify the memory of its own descendants.
    This may differ from a real-world scenario where the attacker targets an arbitrary process,
    but for the purpose of this test it preserves the detection-relevant behavior: the same syscalls and /proc/<pid>/mem
    access patterns are generated regardless of the relationship between injector and target.
  supported_platforms:
    - linux
  dependencies:
    - description: 'gcc must be installed'
      prereq_command: which gcc
      get_prereq_command: apt-get install -y gcc
    - description: 'return_address_overwrite_fullROPchain must be compiled'
      prereq_command: test -f PathToAtomicsFolder/T1055.009/bin/return_address_overwrite_fullROPchain
      get_prereq_command: make -C PathToAtomicsFolder/T1055.009/src
    - description: '/tmp/pwned must not exist before the test'
      prereq_command: test ! -f /tmp/pwned
      get_prereq_command: rm -f /tmp/pwned
  input_arguments:
    bin_path:
      type: path
      default: PathToAtomicsFolder/T1055.009/bin/return_address_overwrite_fullROPchain
      description: path to return_address_overwrite_fullROPchain
  executor:
    command: '#{bin_path}'
    cleanup_command: rm -f /tmp/pwned
    name: sh
    elevation_required: false
