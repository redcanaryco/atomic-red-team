- name: ROP chain Mprotect Return Address Overwrite
  auto_generated_guid: 3d9e332e-60c9-407a-af4c-a9ae43c4f1d0
  description: |
    This technique performs control-flow hijacking via Targeted Stack Pivoting
    and Return Address Overwriting.
    It first identifies a safe, zero-filled writable (rw-) memory region (a "Zero Cave")
    by scanning /proc/<pid>/maps and /proc/<pid>/mem to avoid corrupting vital process data.
    It writes the shellcode into this cave and immediately follows it with a dynamically 
    constructed ROP chain, effectively creating a "Fake Stack".
    This ROP chain is built to invoke mprotect (granting execution permissions) and dynamically
    adapts to modern glibc constraints by padding multi-pop 'rdx' gadgets with dummy values.

    After setting up the Fake Stack, it inspects the process stack (from the RSP register)
    to locate potential saved return addresses. Instead of writing the full ROP chain directly
    onto the target's stack, it overwrites these candidates with a minimal 16-byte "Trampoline"
    consisting of a stack pivot gadget (pop rsp; ret) and the address of the Fake Stack.
    The moment the CPU executes the next RET instruction, the stack pointer is pivoted,
    execution is safely redirected into the ROP chain, and from there to the payload.

    Compared to a standard "ROP chain + return address overwrite" variant,
    this pivoting technique prevents catastrophic stack corruption caused by overlapping 
    payloads when multiple return addresses are clustered together. 
    Furthermore, by writing into a verified Zero Cave instead of arbitrary writable memory, 
    it guarantees that no active program variables are destroyed before the payload triggers.
    This makes the injection highly reliable, stealthy, and capable of bypassing NX/DEP 
    protections without risking immediate segmentation faults.
    
    Note: this test forks a child process to use as the injection target.
    This allows the test to run on systems where ptrace_scope=1 (default on most Linux distributions),
    where a process can only modify the memory of its own descendants.
    This may differ from a real-world scenario where the attacker targets an arbitrary process,
    but for the purpose of this test it preserves the detection-relevant behavior: the same syscalls and /proc/<pid>/mem
    access patterns are generated regardless of the relationship between injector and target.
  supported_platforms:
    - linux
  dependencies:
    - description: 'gcc must be installed'
      prereq_command: which gcc
      get_prereq_command: apt-get install -y gcc
    - description: 'rop_mprotect_return_address_overwrite must be compiled'
      prereq_command: test -f PathToAtomicsFolder/T1055.009/bin/rop_mprotect_return_address_overwrite
      get_prereq_command: make -C PathToAtomicsFolder/T1055.009/src
    - description: '/tmp/pwned must not exist before the test'
      prereq_command: test ! -f /tmp/pwned
      get_prereq_command: rm -f /tmp/pwned
  input_arguments:
    bin_path:
      type: path
      default: PathToAtomicsFolder/T1055.009/bin/rop_mprotect_return_address_overwrite
      description: path to rop_mprotect_return_address_overwrite
  executor:
    command: '#{bin_path}'
    cleanup_command: rm -f /tmp/pwned
    name: sh
    elevation_required: false
- name: Return Address Overwrite for full ROP chain execution
  auto_generated_guid: 5696f417-30e5-4942-988d-0b9dcfe3a929
  description: |
    The injector reads the victim's RSP register from /proc/<pid>/syscall and
    builds a ROP chain that serializes an argv vector for execve into a
    writable memory region, then issues execve to spawn an arbitrary command
    with arguments (it doesn't support shell metacharacters e.g. '|', '>' or '>>').   
    Instead of overwriting a single return address with the full ROP chain
    (which risks catastrophic stack corruption when multiple return addresses
    are clustered), the chain is placed into a separate zero-filled writable
    region - the "Fake Stack". The injector then scans the victim's stack and
    overwrites every executable-looking pointer (potential saved return
    address) with a minimal 16-byte trampoline: { pivot_gadget, fake_stack_addr }
    where pivot_gadget is a `pop rsp; ret` sequence.    
    The moment the CPU executes any of the overwritten 'ret' instructions, the
    stack pointer is pivoted to the fake stack and the execve ROP chain runs.   
    The chain dynamically adapts to modern glibc constraints by selecting the
    best available `pop rdx` variant (single or multi-pop) and padding it with
    dummy values where required.
    
    Note: this test forks a child process to use as the injection target.
    This allows the test to run on systems where ptrace_scope=1 (default on most Linux distributions),
    where a process can only modify the memory of its own descendants.
    This may differ from a real-world scenario where the attacker targets an arbitrary process,
    but for the purpose of this test it preserves the detection-relevant behavior: the same syscalls and /proc/<pid>/mem
    access patterns are generated regardless of the relationship between injector and target.
  supported_platforms:
    - linux
  dependencies:
    - description: 'gcc must be installed'
      prereq_command: which gcc
      get_prereq_command: apt-get install -y gcc
    - description: 'return_address_overwrite_fullROPchain must be compiled'
      prereq_command: test -f PathToAtomicsFolder/T1055.009/bin/return_address_overwrite_fullROPchain
      get_prereq_command: make -C PathToAtomicsFolder/T1055.009/src
    - description: '/tmp/pwned must not exist before the test'
      prereq_command: test ! -f /tmp/pwned
      get_prereq_command: rm -f /tmp/pwned
  input_arguments:
    bin_path:
