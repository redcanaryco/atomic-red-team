attack_technique: T1027.001
display_name: 'Obfuscated Files or Information: Binary Padding'
atomic_tests:
- name: Pad Binary to Change Hash - Linux/macOS dd
  auto_generated_guid: ffe2346c-abd5-4b45-a713-bf5f1ebd573a
  description: |
    Uses dd to add a zero byte, high-quality random data, and low-quality random data to the binary to change the hash.

    Upon successful execution, dd will modify `/tmp/evil-binary`, therefore the expected hash will change.
  supported_platforms:
  - linux
  - macos
  input_arguments:
    file_to_pad:
      description: Path of binary to be padded
      type: path
      default: /tmp/evil-binary
  dependency_executor_name: sh
  dependencies:
  - description: |
      The binary must exist on disk at specified location (#{file_to_pad})
    prereq_command: |
      if [ -f #{file_to_pad} ]; then exit 0; else exit 1; fi;
    get_prereq_command: |
      cp /bin/ls #{file_to_pad}
  executor:
    command: |
      dd if=/dev/zero bs=1 count=1 >> #{file_to_pad} #adds null bytes
      dd if=/dev/random bs=1 count=1 >> #{file_to_pad} #adds high-quality random data
      dd if=/dev/urandom bs=1 count=1 >> #{file_to_pad} #adds low-quality random data
    cleanup_command: |
      rm #{file_to_pad}
    name: sh
    
- name: Pad Binary to Change Hash using truncate command - Linux/macOS
  auto_generated_guid: e22a9e89-69c7-410f-a473-e6c212cd2292
  description: |
    Uses truncate to add a byte to the binary to change the hash.

    Upon successful execution, truncate will modify `/tmp/evil-binary`, therefore the expected hash will change.
  supported_platforms:
  - linux
  - macos
  input_arguments:
    file_to_pad:
      description: Path of binary to be padded
      type: path
      default: /tmp/evil-binary
  dependency_executor_name: sh
  dependencies:
  - description: |
      The binary must exist on disk at specified location (#{file_to_pad})
    prereq_command: |
      if [ -f #{file_to_pad} ]; then exit 0; else exit 1; fi;
    get_prereq_command: |
      cp /bin/ls #{file_to_pad}
  executor:
    command: |
      truncate -s +1 #{file_to_pad} #adds a byte to the file size
    cleanup_command: |
      rm #{file_to_pad}
    name: sh

- name: Pad Binary to Change Hash using PowerShell - Windows
  description: |
    Uses PowerShell to add a zero byte and random data to the binary to change the hash.

    Upon successful execution, PowerShell will modify #{file_to_pad}, therefore the expected hash will change.
  supported_platforms:
  - windows
  input_arguments:
    file_to_pad:
      description: Path of binary to be padded
      type: path
      default: $env:TEMP\evil-binary.exe
  dependency_executor_name: powershell
  dependencies:
  - description: |
      The binary must exist on disk at specified location (#{file_to_pad})
    prereq_command: |
      if (Test-Path "#{file_to_pad}") {exit 0} else {exit 1}
    get_prereq_command: |
      Copy-Item -Path "C:\Windows\System32\cmd.exe" -Destination "#{file_to_pad}" -Force
  executor:
    command: |
      Add-Content -Path "#{file_to_pad}" -Value ([byte[]](0x00)) -Encoding Byte
      $randomByte = New-Object byte[] 1
      (New-Object Random).NextBytes($randomByte)
      Add-Content -Path "#{file_to_pad}" -Value $randomByte -Encoding Byte
    cleanup_command: |
      Remove-Item -Path "#{file_to_pad}" -Force -ErrorAction Ignore
    name: powershell
