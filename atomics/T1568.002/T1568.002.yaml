attack_technique: T1568.002
display_name: "Dynamic Resolution: Domain Generation Algorithms"
atomic_tests:
  - name: DGA Simulation (Python)
    description: |
      Simulates Domain Generation Algorithm (DGA) traffic by generating pseudo-random domains based on the current date and querying them using dig. This is designed to trigger DNS analytics and NGIDS.
    supported_platforms:
      - linux
    dependencies:
      - description: |
          Python 3 must be installed to run the script.
        prereq_command: |
          which python3
        get_prereq_command: |
          sudo apt-get update && sudo apt-get install -y python3
    dependency_executor_name: bash
    executor:
      name: bash
      elevation_required: false
      command: |
        echo "import datetime; import random; import string; import subprocess; import time" > /tmp/dga_sim.py
        echo "TLDs = ['.com', '.net', '.org', '.ru', '.biz']" >> /tmp/dga_sim.py
        echo "def generate_domain(seed):" >> /tmp/dga_sim.py
        echo "    random.seed(seed)" >> /tmp/dga_sim.py
        echo "    length = random.randint(10, 15)" >> /tmp/dga_sim.py
        echo "    name = ''.join(random.choice(string.ascii_lowercase) for _ in range(length))" >> /tmp/dga_sim.py
        echo "    return name + random.choice(TLDs)" >> /tmp/dga_sim.py
        echo "today = datetime.date.today().strftime('%Y%m%d')" >> /tmp/dga_sim.py
        echo "print('[*] DGA cycle seed:', today)" >> /tmp/dga_sim.py
        echo "for i in range(10):" >> /tmp/dga_sim.py
        echo "    domain = generate_domain(today + str(i))" >> /tmp/dga_sim.py
        echo "    print('[+] Querying:', domain)" >> /tmp/dga_sim.py
        echo "    subprocess.run(['dig', '+short', domain], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)" >> /tmp/dga_sim.py
        echo "    time.sleep(2)" >> /tmp/dga_sim.py
        python3 /tmp/dga_sim.py
      cleanup_command: |
        rm -f /tmp/dga_sim.py
