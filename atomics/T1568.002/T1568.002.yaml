attack_technique: T1568.002
display_name: "Dynamic Resolution: Domain Generation Algorithms"
atomic_tests:
  - name: DGA Simulation (Python)
    auto_generated_guid: 
    description: |
      Simulates Domain Generation Algorithm (DGA) traffic by generating pseudo-random domains based on the current date and querying them using dig. This is designed to trigger DNS analytics and NGIDS.
    supported_platforms:
      - linux
    dependencies:
      - description: |
          Python 3 must be installed to run the script.
        prereq_command: |
          which python3
        get_prereq_command: |
          sudo apt-get update && sudo apt-get install -y python3
    dependency_executor_name: bash
    executor:
      name: bash
      elevation_required: false
      command: |
        cat << 'EOF' > /tmp/dga_sim.py
        import datetime
        import random
        import string
        import subprocess
        import time

        TLDs = [".com", ".net", ".org", ".ru", ".biz"]

        def generate_domain(seed):
            random.seed(seed)
            length = random.randint(10, 15)
            name = ''.join(random.choice(string.ascii_lowercase) for _ in range(length))
            return name + random.choice(TLDs)

        today = datetime.date.today().strftime("%Y%m%d")
        print("[*] DGA cycle seed:", today)

        for i in range(10): # number of domains per cycle
            domain = generate_domain(today + str(i))
            print("[+] Querying:", domain)
            subprocess.run(["dig", "+short", domain], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
            time.sleep(2)
        EOF
        python3 /tmp/dga_sim.py
      cleanup_command: |
        rm -f /tmp/dga_sim.py
